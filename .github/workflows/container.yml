name: container

on:
  pull_request:
  push:
    branches:
      - master
  release:
    types:
      - published

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        run: docker build -f Containerfile -t mc-single-arm:test .

      - name: Run browser and API smoke test
        shell: bash
        run: |
          set -euo pipefail
          DATA_ROOT="$(mktemp -d)"
          mkdir -p "$DATA_ROOT/infiles" "$DATA_ROOT/outfiles" "$DATA_ROOT/runout" "$DATA_ROOT/worksim"

          docker run -d --rm \
            --name mc-single-arm-smoke \
            -p 18080:8080 \
            -v "$DATA_ROOT/infiles:/data/infiles" \
            -v "$DATA_ROOT/outfiles:/data/outfiles" \
            -v "$DATA_ROOT/runout:/data/runout" \
            -v "$DATA_ROOT/worksim:/data/worksim" \
            mc-single-arm:test

          sleep 2
          docker ps --filter name=mc-single-arm-smoke --format '{{.Names}}'
          python3 tools/smoke_api_check.py http://127.0.0.1:18080

      - name: Show container logs on failure
        if: failure()
        run: docker logs mc-single-arm-smoke

      - name: Stop smoke container
        if: always()
        run: docker rm -f mc-single-arm-smoke || true

  publish:
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jeffersonlab/mc-single-arm
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
